<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Neon Snake Game</title>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: radial-gradient(circle, #1e1e2f, #0f0f1a);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        h1 { 
            margin: 5px; 
            color: #00ffcc; 
            font-size: 1.8rem; 
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            animation: glow 1.5s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 10px #00ffcc; }
            to { text-shadow: 0 0 20px #00ffcc, 0 0 30px #00ffcc; }
        }
        canvas {
            border: 4px solid #ff007f;
            background-color: #05050a;
            box-shadow: 0 0 20px #ff007f;
            border-radius: 10px;
            display: block;
        }
        #score-board {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            margin: 8px;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 0 0 5px #ffff00;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 65px);
            grid-template-rows: repeat(3, 65px);
            gap: 12px;
            margin-top: 15px;
        }
        .btn-control {
            background: linear-gradient(135deg, #00ffcc, #0099ff);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 255, 204, 0.4);
        }
        .btn-control:active { 
            background: linear-gradient(135deg, #ff007f, #ff00ff);
            box-shadow: 0 0 15px #ff007f;
            transform: scale(0.95);
        }
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }
        
        .restart-btn {
            margin-top: 15px;
            padding: 10px 25px;
            background: linear-gradient(135deg, #ff007f, #ff0055);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }
        .restart-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>✨ SUPER SNAKE ✨</h1>
    <div id="score-board">
        <div id="score">🍎 Score: 0</div>
        <div id="highscore">🏆 High: 0</div>
    </div>
    
    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <div class="controls">
        <button class="btn-control up" onclick="changeDirection('UP')">▲</button>
        <button class="btn-control left" onclick="changeDirection('LEFT')">◀</button>
        <button class="btn-control right" onclick="changeDirection('RIGHT')">▶</button>
        <button class="btn-control down" onclick="changeDirection('DOWN')">▼</button>
    </div>

    <button class="restart-btn" onclick="resetGame()">RESTART</button>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highscoreElement = document.getElementById("highscore");

        const gridSize = 15;
        const tileCount = 20;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let highscore = 0;
        let gameInterval = null;
        let snakeColorHue = 120; // Neon Green starting color

        function startGame() {
            if(gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(update, 160); 
        }

        function update() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || checkCollision(head)) {
                clearInterval(gameInterval);
                alert("💥 GAME OVER! Aapka Score: " + score);
                resetGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = "🍎 Score: " + score;
                if(score > highscore) {
                    highscore = score;
                    highscoreElement.innerText = "🏆 High: " + highscore;
                }
                // Har baar khana khane par snake ka color badlega!
                snakeColorHue = (snakeColorHue + 40) % 360; 
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Background Grid Effect
            ctx.fillStyle = "#05050a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Choti lines background me arcade look ke liye
            ctx.strokeStyle = "rgba(255, 255, 255, 0.03)";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.strokeRect(i, 0, gridSize, canvas.height);
            }

            // Draw Snake (Neon Rainbow Effect)
            snake.forEach((part, index) => {
                // Head thoda alag dikhega aur body me shade aayega
                let hue = (snakeColorHue + (index * 10)) % 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                ctx.shadowBlur = index === 0 ? 10 : 4;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                
                // Rounded blocks bacho ke liye
                ctx.beginPath();
                ctx.arc((part.x * gridSize) + gridSize/2, (part.y * gridSize) + gridSize/2, gridSize/2 - 1, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Food (Glow Apple Effect)
            ctx.fillStyle = "#ff0055";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff0055";
            ctx.beginPath();
            ctx.arc((food.x * gridSize) + gridSize/2, (food.y * gridSize) + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Shadow reset taaki baki cheezein kharab na ho
            ctx.shadowBlur = 0;
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                    break;
                }
            }
        }

        function checkCollision(head) {
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function changeDirection(dir) {
            if (dir === 'UP' && dy !== 1) { dx = 0; dy = -1; }
            if (dir === 'DOWN' && dy !== -1) { dx = 0; dy = 1; }
            if (dir === 'LEFT' && dx !== 1) { dx = -1; dy = 0; }
            if (dir === 'RIGHT' && dx !== -1) { dx = 1; dy = 0; }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = "🍎 Score: 0";
            snakeColorHue = 120;
            generateFood();
            startGame();
        }

        generateFood();
        draw();
        startGame();
    </script>
</body>
</html>
